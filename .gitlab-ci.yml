stages:
  - build
  - deploy

build:
  stage: build
  image: node:20
  script:
    - cd euchre-react
    - npm i
    - npm run build
  artifacts:
    paths:
      - euchre-react/dist/
    expire_in: 1 hour

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $DROPLET_HOST >> ~/.ssh/known_hosts
  script:
    - rsync -az --delete euchre-react/dist/ $DROPLET_USER@$DROPLET_HOST:/var/www/play-euchre.com/html/
  rules:
    - if: $CI_COMMIT_BRANCH == "prod"
